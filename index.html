<!DOCTYPE html>
 <html>
  <head>
    <meta charset="utf-8" />
    <title>CircuitSetup ESPHome Installer</title>
    <meta
      name="description"
      content="Easily allow users to install CircuitSetup ESPHome firmware on the web."
    />
    <meta name="viewport" content="width=device-width" />
    <meta name="color-scheme" content="dark light" />
    <style>
      body {
        font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI",
          Roboto, Ubuntu, sans-serif;
        padding: 0;
        margin: 0;
        line-height: 1.4;
      }
      .content {
        max-width: 600px;
        margin: 0 auto;
        padding: 12px;
      }
      h2 {
        margin-top: 2em;
      }
      h3 {
        margin-top: 1.5em;
      }
      .product-header-link {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 0.12em;
      }
      .selector-label-link {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 0.12em;
      }
      .product-header-link:hover,
      .product-header-link:focus,
      .selector-label-link:hover,
      .selector-label-link:focus {
        color: inherit;
      }
      a {
        color: #03a9f4;
      }
      .invisible {
        visibility: hidden;
      }
      .hidden {
        display: none;
      }
      esp-web-install-button[install-unsupported] {
        visibility: inherit;
      }
      .content pre {
        max-width: 100%;
        overflow-y: scroll;
      }
      .footer {
        margin-top: 24px;
        border-top: 1px solid #ccc;
        padding-top: 24px;
        text-align: center;
      }
      .footer .initiative {
        font-style: italic;
        margin-top: 16px;
      }
      table {
        border-spacing: 0;
      }
      td {
        padding: 8px;
        border-bottom: 1px solid #ccc;
      }
      .radios li {
        list-style: none;
        line-height: 2em;
      }
      .radios {
        padding-left: 0;
      }
      .product-section {
        margin-bottom: 24px;
      }
      .meter-selectors {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      .selector-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .selector-note {
        font-size: 0.9em;
        line-height: 1.5;
        margin: 0;
      }
      .selector-note a {
        text-decoration: underline;
      }
      .selector-field select,
      #version-select {
        font: inherit;
        padding: 6px;
        max-width: 100%;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #333;
          color: #fff;
        }
        a {
          color: #58a6ff;
        }
      }
    </style>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  </head>
  <body>
    <div class="content">
      <h1>CircuitSetup ESPHome Installer</h1>
      <h2>Select your product:</h2>
      <div id="product-list">
        <div class="product-section" id="meter-section">
          <h3><a class="product-header-link" href="https://circuitsetup.us/index.php/product/expandable-6-channel-esp32-energy-meter/" target="_blank" rel="noopener noreferrer">6 Channel Meter</a></h3>
          <div class="meter-selectors">
            <label class="selector-field" for="meter-addon-select">
              <span>Number of <a class="selector-label-link" href="https://circuitsetup.us/index.php/product/expandable-6-channel-esp32-energy-meter-add-on-board/" target="_blank" rel="noopener noreferrer">add-on boards</a></span>
              <select id="meter-addon-select">
                <option value="">Select add-on boards</option>
                <option value="none" selected>None</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
              </select>
              <p id="meter-addon-note" class="selector-note hidden"></p>
            </label>
            <label class="selector-field" for="meter-connection-select">
              <span>Connection type</span>
              <select id="meter-connection-select">
                <option value="">Select connection type</option>
                <option value="wifi" selected>Wi-Fi</option>
                <option value="ethernet">Ethernet (Lilygo)</option>
                <option value="ethernet_waveshare">Ethernet (Waveshare)</option>
              </select>
            </label>
          </div>
        </div>
        <div class="product-section hidden" id="gdo-section">
          <h3><a class="product-header-link" href="https://circuitsetup.us/product/security-garage-door-opener/" target="_blank" rel="noopener noreferrer">Garage Door Opener</a></h3>
          <ul class="radios" id="gdo-product-list">
            <!-- dynamically populated -->
          </ul>
        </div>
      </div>
      <h2>Select firmware version:</h2>
      <select id="version-select" disabled>
        <option value="">Select meter options or GDO first</option>
      </select>
      <p class="button-row" align="center">
        <esp-web-install-button class="invisible"></esp-web-install-button>
      </p>

      <p>
        To flash your ESP32 you will likely need to hold down the right (IO0) button before clicking on "Install..."
      </p>
      
      <div class="footer">
        Installer powered by <a href="https://esphome.github.io/esp-web-tools/">ESP Web Tools</a>.
      </div>
      <script>
      let firmwareIndex = [];
      const addonJumperPositions = [
        { ordinal: "1st", pins: "(0, 16)" },
        { ordinal: "2nd", pins: "(27, 17)" },
        { ordinal: "3rd", pins: "(2, 21)" },
        { ordinal: "4th", pins: "(13, 22)" },
        { ordinal: "5th", pins: "(14, 25)" },
        { ordinal: "6th", pins: "(15, 26)" }
      ];
      const addonConfigSourceUrl = "https://github.com/CircuitSetup/Expandable-6-Channel-ESP32-Energy-Meter/tree/master/Software/ESPHome";
      
      async function loadFirmwareIndex() {
        const response = await fetch('manifests/firmware_index.json');
        firmwareIndex = await response.json();
      }
      
      function compareVersions(a, b) {
        const parse = v => v.split(/[-.]/).map(x => isNaN(x) ? x : parseInt(x));
        const pa = parse(a), pb = parse(b);
      
        for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
          if (pa[i] === undefined) return -1;
          if (pb[i] === undefined) return 1;
          if (pa[i] > pb[i]) return -1;
          if (pa[i] < pb[i]) return 1;
        }
        return 0;
      }

      function getProductEntry(productId) {
        return firmwareIndex.find(product => product.productId === productId);
      }

      function getManifestPath(productId, version) {
        return `manifests/manifest_${productId}-${version}.json`;
      }

      function createGdoRadios() {
        const gdoSection = document.getElementById("gdo-section");
        const gdoProductList = document.getElementById("gdo-product-list");
        const gdoProducts = firmwareIndex
          .filter(product => product.productId.startsWith("circuitsetup-gdo"))
          .sort((a, b) => a.name.localeCompare(b.name));

        gdoProductList.innerHTML = "";

        if (gdoProducts.length === 0) {
          gdoSection.classList.add("hidden");
          return;
        }

        gdoSection.classList.remove("hidden");

        gdoProducts.forEach(product => {
          const li = document.createElement("li");
          const label = document.createElement("label");
          const radio = document.createElement("input");

          radio.type = "radio";
          radio.name = "type";
          radio.value = product.productId;

          label.appendChild(radio);
          label.append(` ${product.name}`);
          li.appendChild(label);
          gdoProductList.appendChild(li);
        });
      }

      function clearGdoSelection() {
        document.querySelectorAll('input[name="type"]').forEach(radio => {
          radio.checked = false;
        });
      }

      function formatList(items) {
        if (items.length <= 1) {
          return items[0] || "";
        }

        if (items.length === 2) {
          return `${items[0]} and ${items[1]}`;
        }

        return `${items.slice(0, -1).join(", ")}, and ${items[items.length - 1]}`;
      }

      function updateAddonNote(addonValue) {
        const addonNote = document.getElementById("meter-addon-note");
        const addonCount = parseInt(addonValue, 10);

        if (Number.isNaN(addonCount) || addonCount < 1 || addonCount > addonJumperPositions.length) {
          addonNote.innerHTML = "";
          addonNote.classList.add("hidden");
          return;
        }

        const selectedPositions = addonJumperPositions.slice(0, addonCount);
        const ordinals = selectedPositions.map(position => position.ordinal);
        const pins = selectedPositions.map(position => position.pins);
        const positionLabel = addonCount === 1 ? "position" : "positions";

        addonNote.innerHTML = `Add-on board CS jumpers should be in the ${formatList(ordinals)} ${positionLabel}: ${pins.join(", ")}. CS pins are defined in the <a href="${addonConfigSourceUrl}" target="_blank" rel="noopener noreferrer">ESPHome config files</a>.`;
        addonNote.classList.remove("hidden");
      }

      function resetMeterSelectors() {
        document.getElementById("meter-addon-select").value = "";
        document.getElementById("meter-connection-select").value = "";
        updateAddonNote("");
      }

      function resetVersionSelect(versionSelect, installButton, message = "Select meter options or GDO first") {
        versionSelect.innerHTML = "";

        const option = document.createElement("option");
        option.value = "";
        option.textContent = message;
        option.selected = true;

        versionSelect.appendChild(option);
        versionSelect.disabled = true;
        installButton.manifest = "";
        installButton.classList.add("invisible");
      }

      function populateVersionSelect(versionSelect, installButton, resolvedVersions) {
        versionSelect.innerHTML = "";

        resolvedVersions.forEach((item, index) => {
          const option = document.createElement("option");
          option.value = item.manifestPath;
          option.textContent = item.version;
          option.dataset.version = item.version;

          if (index === 0) {
            option.selected = true;
          }

          versionSelect.appendChild(option);
        });

        versionSelect.disabled = false;
        versionSelect.dispatchEvent(new Event("change"));
      }

      function resolveMeterProductIds(addonValue, connectionValue) {
        if (!addonValue || !connectionValue) {
          return [];
        }

        if (addonValue === "none") {
          if (connectionValue === "wifi") {
            return ["6chan_energy_meter_main_board"];
          }

          if (connectionValue === "ethernet") {
            return ["6chan_energy_meter_main_ethernet"];
          }

          if (connectionValue === "ethernet_waveshare") {
            return [
              "6chan_energy_meter_main_ethernet_waveshare",
              "6chan_energy_meter_main_ethernet_ws"
            ];
          }

          return [];
        }

        const addonSuffix = addonValue === "1" ? "1-addon" : `${addonValue}-addons`;

        if (connectionValue === "wifi") {
          return [`6chan_energy_meter_${addonSuffix}`];
        }

        if (connectionValue === "ethernet") {
          return [`6chan_energy_meter_${addonSuffix}_ethernet`];
        }

        if (connectionValue === "ethernet_waveshare") {
          return [`6chan_energy_meter_${addonSuffix}_ethernet_waveshare`];
        }

        return [];
      }

      function buildResolvedVersions(productIds) {
        const versionMap = new Map();

        productIds.forEach(productId => {
          const entry = getProductEntry(productId);

          if (!entry) {
            return;
          }

          entry.versions.forEach(versionEntry => {
            if (!versionMap.has(versionEntry.version)) {
              versionMap.set(versionEntry.version, {
                version: versionEntry.version,
                manifestPath: getManifestPath(productId, versionEntry.version)
              });
            }
          });
        });

        return Array.from(versionMap.values()).sort((a, b) => compareVersions(a.version, b.version));
      }

      async function init() {
        await loadFirmwareIndex();
        createGdoRadios();
      
        const versionSelect = document.getElementById("version-select");
        const installButton = document.querySelector("esp-web-install-button");
        const meterAddonSelect = document.getElementById("meter-addon-select");
        const meterConnectionSelect = document.getElementById("meter-connection-select");

        function populateVersionsForProductIds(productIds) {
          const resolvedVersions = buildResolvedVersions(productIds);

          if (resolvedVersions.length > 0) {
            populateVersionSelect(versionSelect, installButton, resolvedVersions);
          } else {
            resetVersionSelect(versionSelect, installButton, "No firmware available");
          }
        }

        function updateMeterSelection() {
          clearGdoSelection();
          updateAddonNote(meterAddonSelect.value);

          if (!meterAddonSelect.value || !meterConnectionSelect.value) {
            resetVersionSelect(versionSelect, installButton, "Select both meter options");
            return;
          }

          populateVersionsForProductIds(
            resolveMeterProductIds(meterAddonSelect.value, meterConnectionSelect.value)
          );
        }

        document.querySelectorAll('input[name="type"]').forEach(radio => {
          radio.addEventListener("change", () => {
            resetMeterSelectors();
            populateVersionsForProductIds([radio.value]);
          });
        });

        meterAddonSelect.addEventListener("change", updateMeterSelection);
        meterConnectionSelect.addEventListener("change", updateMeterSelection);
      
        versionSelect.addEventListener("change", () => {
          const selectedManifest = versionSelect.value;
      
          if (selectedManifest) {
            installButton.manifest = selectedManifest;
            installButton.classList.remove("invisible");
          } else {
            installButton.manifest = "";
            installButton.classList.add("invisible");
          }
        });

        updateMeterSelection();
      }
      
      init();
      </script>



  </body>
</html>
